name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
      - 'DEPLOY.md'
      - 'README.md'
      - '**.md'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy images to public
        run: |
          mkdir -p public/img
          cp -r src/img/* public/img/ 2>/dev/null || true

      - name: Build
        run: npm run build

      - name: Deploy to main (docs/)
        run: |
          cp -r dist docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs
          git diff --staged --quiet || (git commit -m "Deploy: update docs" && git push)
